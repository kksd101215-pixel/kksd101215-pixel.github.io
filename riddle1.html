<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riddle 1</title>
<style>
body{font-family:Arial;background:#111;color:white;text-align:center;padding:40px;}
.container{background:#222;padding:20px;border-radius:10px;}
input,button{padding:10px;margin-top:10px;font-size:16px;}
</style>

<script>
function checkAnswer(){
let answer=document.getElementById("answer").value.toLowerCase();
if(answer==="keyboard"){
window.location.href="riddle2.html";
}else{
alert("Wrong answer!");
}
}
</script>

</head>
<body>

<div class="container">
<h2>Riddle 1</h2>
<p>I have keys but no locks. What am I?</p>

<input type="text" id="answer">
<br>
<button onclick="checkAnswer()">Submit</button>
</div>

</body>
</html>
