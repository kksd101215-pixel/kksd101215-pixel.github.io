<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Riddle</title>

<style>
body{font-family:Arial;background:#111;color:white;text-align:center;padding:40px;}
.container{background:#222;padding:20px;border-radius:10px;}
</style>

<script>
function checkAnswer(){

let answer=document.getElementById("answer").value.toLowerCase();

if(answer==="brain"){

alert("Congratulations! You completed the game!");

window.location.href="index.html";

}else{

alert("Wrong answer!");

}

}
</script>

</head>
<body>

<div class="container">

<h2>Final Riddle</h2>

<p>I control everything you think. What am I?</p>

<input id="answer">

<br>

<button onclick="checkAnswer()">Submit</button>

</div>

</body>
</html>
